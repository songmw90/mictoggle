name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore locked dependencies
        run: dotnet restore MicToggle.sln --locked-mode

      - name: Run tests
        run: dotnet test MicToggle.sln -c Release --no-restore

      - name: Build release archive
        shell: pwsh
        run: .\scripts\publish.ps1

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: MicToggle-win-x64
          path: |
            artifacts/MicToggle-win-x64.zip
            artifacts/MicToggle-win-x64.zip.sha256
          if-no-files-found: error
